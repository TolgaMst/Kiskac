<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description"
        content="Kıskaç Cafe & Bar — Deniz ürünleriyle ünlü, eşsiz lezzetlerin adresi. QR Menü ile menümüzü keşfedin.">
    <meta name="theme-color" content="#0a1628">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Kıskaç Cafe & Bar — QR Menü</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🦀</text></svg>">
</head>

<body>

    <!-- Wave Background -->
    <div class="wave-bg"></div>

    <!-- Bubbles -->
    <div class="bubbles" id="bubbles"></div>

    <!-- ====== SPLASH SCREEN ====== -->
    <div class="splash-screen" id="splashScreen">
        <div class="splash-logo"><img src="logo.png" alt="Kıskaç Logo" class="splash-logo-img"></div>
        <h1 class="splash-name" id="splashName">Kıskaç Cafe & Bar</h1>
        <p class="splash-slogan" id="splashSlogan">Denizin En Taze Hali</p>
        <div class="splash-status" id="splashStatus">
            <span class="status-dot"></span>
            <span class="status-text">Açık</span>
        </div>
        <button class="splash-btn" id="splashBtn">
            Menüyü Gör
            <span>→</span>
        </button>

        <!-- Info Toggle -->
        <div class="info-toggle" id="infoToggle">
            <span class="info-toggle-text" data-i18n="info">Bilgi</span>
            <span class="info-toggle-icon">⌄</span>
        </div>
    </div>

    <!-- ====== INFO OVERLAY ====== -->
    <div class="info-overlay" id="infoOverlay">
        <div class="info-content">
            <div class="info-header">
                <h2 data-i18n="businessInfo">İşletme Bilgileri</h2>
                <button class="info-close" id="infoClose">×</button>
            </div>
            <div class="info-body" id="infoBody">
                <!-- JS ile dolacak -->
            </div>
        </div>
    </div>

    <!-- ====== MAIN CONTENT ====== -->
    <div class="main-content" id="mainContent">

        <!-- Navbar -->
        <nav class="navbar">
            <div class="navbar-inner">
                <div class="navbar-brand">
                    <div class="navbar-logo"><img src="logo.png" alt="Kıskaç" class="navbar-logo-img"></div>
                    <span class="navbar-title" id="navTitle">Kıskaç Cafe & Bar</span>
                </div>
                <div class="navbar-right">
                    <div class="lang-switcher" id="langSwitcher">
                        <span class="lang-btn active" data-lang="tr">TR</span>
                        <span class="lang-divider">|</span>
                        <span class="lang-btn" data-lang="en">EN</span>
                    </div>
                    <div class="navbar-status">
                        <span class="status-dot"></span>
                        <span class="status-text" data-i18n="open">Açık</span>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Search Bar -->
        <div class="search-container">
            <div class="search-inner">
                <span class="search-icon">🔍</span>
                <input type="text" id="menuSearch" placeholder="Ürün ara..." autocomplete="off">
            </div>
        </div>

        <!-- Category Navigation -->
        <div class="category-nav">
            <div class="category-scroll" id="categoryScroll">
                <!-- Skeleton placeholders -->
                <div class="category-skeleton"></div>
                <div class="category-skeleton"></div>
                <div class="category-skeleton"></div>
                <div class="category-skeleton"></div>
                <div class="category-skeleton"></div>
                <div class="category-skeleton"></div>
            </div>
        </div>

        <!-- Menu Content -->
        <div class="menu-container" id="menuContainer">
            <!-- Skeleton placeholders -->
            <div class="skeleton-section">
                <div class="skeleton-header"></div>
                <div class="skeleton-item"></div>
                <div class="skeleton-item"></div>
                <div class="skeleton-item"></div>
            </div>
            <div class="skeleton-section">
                <div class="skeleton-header"></div>
                <div class="skeleton-item"></div>
                <div class="skeleton-item"></div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-brand" id="footerBrand">Kıskaç Cafe & Bar</div>
            <div class="footer-divider"></div>
            <p class="footer-text">Deniz ürünleriyle ünlü, eşsiz lezzetlerin adresi</p>
            <p class="footer-text" style="margin-top: 10px; opacity: 0.6;">© 2026 Kıskaç Cafe & Bar. Tüm hakları
                saklıdır.</p>
            <div class="footer-links" id="socialLinks">
                <!-- JS ile dolacak -->
            </div>
            <div class="footer-links">
                <a href="admin.html" class="footer-link" style="opacity: 0.3; font-size: 0.7rem;">Yönetim</a>
            </div>
        </footer>
    </div>

    <!-- Scroll to Top -->
    <button class="scroll-top-btn" id="scrollTopBtn" title="Yukarı çık">↑</button>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>

</html>
